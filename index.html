<style>

*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}

main{max-width:1120px;margin:0 auto;padding:16px}.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 8px 22px #0000000d}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
button{border:0;border-radius:12px;padding:12px 14px;background:var(--accent);color:white;font-weight:800;cursor:pointer}button.secondary{background:#f5eee8;color:var(--ink);border:1px solid var(--line)}button.ghost{background:white;color:var(--accent);border:1px solid var(--accent)}button:disabled{opacity:.65;cursor:not-allowed}.modebtn{text-align:left;min-height:94px}.modebtn b{display:block;font-size:16px;margin-bottom:5px}.modebtn span{font-weight:500;color:#f3dbe4}.question{font-size:21px;font-weight:900;margin:0 0 12px}.sub{color:var(--muted);margin:0 0 14px}.options{display:grid;gap:10px}.opt{background:#fff;border:2px solid var(--line);color:var(--ink);text-align:left;font-weight:650;line-height:1.35}.opt:hover{border-color:var(--accent2)}.opt.correct{border-color:var(--ok);background:#eaf7ef}.opt.wrong{border-color:var(--bad);background:#fdeceb}.feedback{border-left:5px solid var(--accent2);padding:12px;background:#fff9f1;border-radius:10px;margin-top:14px;line-height:1.45}.ok{color:var(--ok);font-weight:900}.bad{color:var(--bad);font-weight:900}.score{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:10px}.pill{background:#f5eee8;border:1px solid var(--line);border-radius:999px;padding:7px 11px;font-weight:750}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.matchwrap{display:grid;grid-template-columns:1fr 1.45fr;gap:14px}.matchitem,.target{padding:12px;border:2px solid var(--line);border-radius:12px;background:white;margin:8px 0;cursor:pointer}.matchitem.selected,.target.selected{border-color:var(--accent);background:#fff2f6}.matchitem.done,.target.done{border-color:var(--ok);background:#edf9f1;cursor:default}.contract-card{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;cursor:pointer}.contract-card:hover{border-color:var(--accent2)}.tag{display:inline-block;background:#f5eee8;border:1px solid var(--line);border-radius:999px;padding:5px 9px;margin:3px;font-size:13px}.mini{font-size:14px;color:var(--muted)}.hidden{display:none}.kbd{font-family:ui-monospace,Menlo,monospace;background:#f5eee8;border:1px solid var(--line);border-radius:6px;padding:1px 5px}@media(max-width:760px){.matchwrap{grid-template-columns:1fr}header h1{font-size:22px}.question{font-size:19px}}

<body><header><h1>Római jog II. – interaktív tanuló teszt v7</h1><p>Javított szerződés-tréner: nem árulja el a választ. Új vizsgamód: kérdéssor, léptetés, végső értékelés.</p></header><main>
<section class="panel" id="home"><h2>Válassz tanulási módot</h2><div class="score"><span class="pill" id="score">Pont: 0/0</span><span class="pill" id="wrong">Hibás gyűjtő: 0</span><span class="pill">Fogalomkártyák: <span id="termCount"></span></span></div><div class="grid">

<button class="modebtn" onclick="startMatch()"><b>Párosító</b><span>Fogalmak és jelentések összekötése.</span></button>

</div></section><section class="panel" id="app"><p>Indulhat. A cél nem a szenvedés, arra ott van maga a római jog.</p></section></main>
<script>
const DATA = {"terms": [{"term": "Felfüggesztő feltétel (condicio suspensiva)", "raw": "Felfüggesztő feltétel (condicio suspensiva)", "def": "Jövőbeli bizonytalan esemény, amelynek bekövetkeztéig az érvényes jogügylet hatályba nem lép (ideiglenes hatálytalanság). Ha a feltétel meghiúsul, a jogügylet soha nem lép hatályba (végleges hatálytalanság). Pl. 'Ha megérkezik a hajó Afrikából, eladom a lovamat 5 aranyért.'", "short": "Jövőbeli bizonytalan esemény, amelynek bekövetkeztéig az érvényes jogügylet hatályba nem lép (ideiglenes hatálytalanság)."}, {"term": "Bontó feltétel (condicio resolutiva)", "raw": "Bontó feltétel (condicio resolutiva)", "def": "A jogügylet a megkötéssel egyidejűleg azonnal hatályba lép, de a feltétel beálltával hatályát veszti. Pl. 'Ha január 1-jén nem fizeted a vételárat, a telket vissza kell adnod.'", "short": "A jogügylet a megkötéssel egyidejűleg azonnal hatályba lép, de a feltétel beálltával hatályát veszti."}, {"term": "Foglaló (arrha)", "raw": "Foglaló (arrha)", "def": "Az adásvételi szerződés megkötésének jeléül a vevő által az eladónak átadott érték (gyűrű, pénz). Posztklasszikus korban büntető jelleget vett fel: ha a foglalót adó fél lép vissza, elveszti; ha a foglalót kapó fél nem teljesít, kétszerest köteles visszaadni.", "short": "Az adásvételi szerződés megkötésének jeléül a vevő által az eladónak átadott érték (gyűrű, pénz)."}, {"term": "Culpa lata", "raw": "Culpa lata", "def": "Nagyfokú gondatlanság: valaki nem ügyel még arra sem, amire mindenki ügyelni szokott. Mérce: az átlagember gondossága (absztrakt, objektív). Mindenki felel culpa latáért – a culpa lata dolo aequiparatur elve alapján dolusszal azonos elbírálás alá esik.", "short": "Nagyfokú gondatlanság: valaki nem ügyel még arra sem, amire mindenki ügyelni szokott."}, {"term": "Teljesítés helyetti adás (Datio in solutum)", "raw": "Datio in solutum (teljesítés helyetti adás)", "def": "Az adós a hitelező hozzájárulásával más dologgal teljesít, mint ami eredetileg ki volt kötve. Pl. pénzbeli tartozása fejében telket ajánl fel, amelyet a hitelező elfogad. Különbözik a facultas alternativától: ott a törvény/szerződés hatalmazza fel az adóst, itt a hitelező utólagos beleegyezése szükséges.", "short": "Az adós a hitelező hozzájárulásával más dologgal teljesít, mint ami eredetileg ki volt kötve."}, {"term": "Nyugvó hagyaték (Hereditas iacens)", "raw": "Hereditas iacens (nyugvó hagyaték)", "def": "Az örökség megnyílása (delatio) és megszerzése közötti ideiglenes állapot, amelyben a hagyatéknak nincs örököse. Önálló életet él: rabszolgái szerzeményeit gyarapítják, delictumai keletkezhetnek. A praetor szükség szerint gondnokot rendelhet ki. Ha végül senki sem szerzi meg, bona vacantia lesz belőle.", "short": "Az örökség megnyílása (delatio) és megszerzése közötti ideiglenes állapot, amelyben a hagyatéknak nincs örököse."}, {"term": "Időtűzés (dies)", "raw": "Időtűzés (dies)", "def": "A felek azon rendelkezése, amellyel a jogügylet hatályát bizonyos időponthoz kötik. Dies a quo: kezdő időpont (ettől lép hatályba). Dies ad quem: befejező időpont (ekkor szűnik meg a hatály). Különbözik a feltételtől: az időtűzésnél a bekövetkezés biztos, csak az időpont kérdéses.", "short": "A felek azon rendelkezése, amellyel a jogügylet hatályát bizonyos időponthoz kötik."}, {"term": "Lineáris (in lineas) öröklés", "raw": "Lineáris (in lineas) öröklés", "def": "Iustinianusnál az oldalági rokonok öröklésénél alkalmazott elv: a hagyaték az anyai és apai ág szerint arányosan oszlik meg, tekintet nélkül arra, hogy melyik ágban több örökös van.", "short": "Iustinianusnál az oldalági rokonok öröklésénél alkalmazott elv: a hagyaték az anyai és apai ág szerint arányosan oszlik meg, tekintet nélkül arra, hogy melyik ágban több örökös van."}, {"term": "Favor testamenti elve", "raw": "Favor testamenti elve", "def": "A végrendelkezés szabadságát védő értelmezési alapelv: a végrendelkező feltehető akaratát a lehető legteljesebb mértékben érvényesíteni kell. Ha a végrendelet homályosan fogalmaz, a szellemiségi értelmezés az irányadó – nem a betű szerinti, hanem az örökhagyó valószínű szándéka.", "short": "A végrendelkezés szabadságát védő értelmezési alapelv: a végrendelkező feltehető akaratát a lehető legteljesebb mértékben érvényesíteni kell."}, {"term": "Hagyaték (hereditas)", "raw": "Hagyaték (hereditas)", "def": "Az örökhagyó összes, halál esetén átszálló vagyoni joga és kötelezettsége. Aktív hagyaték: jogok. Passzív hagyaték: kötelezettségek (damnosa hereditas: túlterhelt hagyaték). Nem tartalmazza: a családi jogokat (patria potestas, manus), a személyes szolgalmakat, az eltartásra való jogot, a bűncselekményből eredő tartozásokat.", "short": "Az örökhagyó összes, halál esetén átszálló vagyoni joga és kötelezettsége."}, {"term": "Hagyomány (legatum)", "raw": "Hagyomány (legatum)", "def": "A hagyatéknak az a része, amely halál esetére szóló különös jogutódlással (hagyományozással) a hagyományosra száll. Az örökhagyó végrendeletében az örökös terhére rendeli. Fajtái: dologi hagyomány (legatum per vindicationem – in rem actio) és kötelmi hagyomány (legatum per damnationem – in personam actio az örökössel szemben).", "short": "A hagyatéknak az a része, amely halál esetére szóló különös jogutódlással (hagyományozással) a hagyományosra száll."}, {"term": "In capita öröklés", "raw": "In capita öröklés", "def": "Az örökösök fejenként, egyenlő arányban részesednek a hagyatékból. Pl. három sui heres esetén mindenki 1/3-ot örököl. Az in stirpes öröklés ellentéte.", "short": "Az örökösök fejenként, egyenlő arányban részesednek a hagyatékból. Pl."}, {"term": "In stirpes öröklés", "raw": "In stirpes öröklés", "def": "Törzsönkénti öröklés a képviseleti elv (ius representationis) alapján: a kieső örökös helyén leszármazói együttesen örökölnek annyit, amennyi az elődjüknek járt volna. Pl. ha az örökhagyó egyik fia meghalt, de gyermekei élnek, azok együtt kapják meg az apa részét.", "short": "Törzsönkénti öröklés a képviseleti elv (ius representationis) alapján: a kieső örökös helyén leszármazói együttesen örökölnek annyit, amennyi az elődjüknek járt volna."}, {"term": "Osztályra bocsátás (Collatio)", "raw": "Collatio (osztályra bocsátás)", "def": "Az örököstársak kötelesek az örökhagyótól életében kapott ingyenes juttatásokat a közös hagyatékhoz hozzászámítani, hogy az öröklési arányok méltányosak legyenek. Fajtái: collatio emancipati (emancipáció óta szerzett vagyon), collatio dotis (hozomány), collatio descendentium (lemenők által kapott minden ajándék).", "short": "Az örököstársak kötelesek az örökhagyótól életében kapott ingyenes juttatásokat a közös hagyatékhoz hozzászámítani, hogy az öröklési arányok méltányosak legyenek."}, {"term": "Culpa in concreto", "raw": "Culpa in concreto", "def": "Egyéni, szubjektív gondatlanság: az adós nem tanúsítja azt a gondosságot, amellyel saját ügyeiben eljárni szokott. Mértékét egyénileg kell megállapítani. Bizalmi viszonyokban jelenik meg: gyámság, gondnokság, férji vagyonkezelés. Ez a legszigorúbb vétkességi fokozat – azt várjuk el, hogy más dolgát úgy kezelje, mint a sajátját.", "short": "Egyéni, szubjektív gondatlanság: az adós nem tanúsítja azt a gondosságot, amellyel saját ügyeiben eljárni szokott."}, {"term": "Facultas alternativa", "raw": "Facultas alternativa", "def": "Vagylagos felhatalmazzottság: a törvény vagy szerződés felhatalmazza az adóst, hogy a hitelező által követelt szolgáltatás helyett egy másik, előre meghatározott szolgáltatással teljesítsen. Különbözik a vagylagos kötelemtől (obligatio alternativa): ott mindkét szolgáltatás a kötelem tárgya, itt csak egy, a másik csupán teljesítési lehetőség.", "short": "Vagylagos felhatalmazzottság: a törvény vagy szerződés felhatalmazza az adóst, hogy a hitelező által követelt szolgáltatás helyett egy másik, előre meghatározott szolgáltatással teljesítsen."}, {"term": "Érdemtelenség (Indignitas)", "raw": "Indignitas (érdemtelenség)", "def": "Az indignus jog szerint örökös, de az örökséget tőle elragadják (bona ereptoria) – az államkincstárra száll. Érdemtelen, aki az örökhagyót súlyosan bántalmazta, megakadályozta a végrendelkezésben, megölte, vagy a végrendeletet alaptalanul megtámadta. Különbözik az incapacitastól: az incapax nem tudja megszerezni az örökséget, az indignus megszerezte, de elveszíti.", "short": "Az indignus jog szerint örökös, de az örökséget tőle elragadják (bona ereptoria) – az államkincstárra száll."}, {"term": "Kármegosztás (Lex Rhodia de iactu mercium)", "raw": "Kármegosztás (Lex Rhodia de iactu mercium)", "def": "Ha tengeri veszély esetén a hajó megkönnyítése céljából árukat dobnak ki, az ebből adódó kárt meg kell osztani mindazok között, akiknek a hajó megmenekítéséhez vagyoni érdekük fűződött. A locatio conductio operis keretében érvényesíthetők az igények: actio locati az árutulajdonosok részéről a hajós ellen.", "short": "Ha tengeri veszély esetén a hajó megkönnyítése céljából árukat dobnak ki, az ebből adódó kárt meg kell osztani mindazok között, akiknek a hajó megmenekítéséhez vagyoni érdekük fűződött."}, {"term": "Képviseleti elv (ius representationis)", "raw": "Képviseleti elv (ius representationis)", "def": "Ha valaki az örökhagyó előtt meghal, helyére lép annak leszármazója – az apa örökrészét a gyermekek együttesen kapják meg (in stirpes öröklés). A civiljogi törvényes öröklésben érvényesül: az elhalt filius familias gyermekei és manusos felesége törzsként öröklik azt, ami az apának járt volna.", "short": "Ha valaki az örökhagyó előtt meghal, helyére lép annak leszármazója – az apa örökrészét a gyermekek együttesen kapják meg (in stirpes öröklés)."}, {"term": "Készfizető kezesség", "raw": "Készfizető kezesség", "def": "A hitelező nem köteles előbb a főadóst perelni – közvetlenül a kezest is pertőbe foghatja. Iustinianus a beneficium ordinis bevezetésével mérsékelte: a hitelező köteles előbb a főadóson megkísérelni a behajtást, és csak annak sikertelensége esetén fordulhat a kezeshez.", "short": "A hitelező nem köteles előbb a főadóst perelni – közvetlenül a kezest is pertőbe foghatja."}, {"term": "Jogügylet (Negotium)", "raw": "Negotium (jogügylet)", "def": "Joghatás kiváltására irányuló akaratkijelentés (pandektista definíció). Konjunktív elemei: akarat (belső), nyilatkozat (külső), joghatásra irányulás – mindháromnak hibátlannak és összhangban kell lennie. Ha bármelyik elem hibás, a jogügylet érvénytelen vagy nem létező.", "short": "Joghatás kiváltására irányuló akaratkijelentés (pandektista definíció)."}, {"term": "Nyilatkozati elv", "raw": "Nyilatkozati elv", "def": "A jogügylet érvényességéhez a külső megnyilvánulás (nyilatkozat) is szükséges, nemcsak a belső akarat. A formai előírások betartása garantálja a jogbiztonságot – ezért az alakszerű jogügyleteknél a forma megsértése érvénytelenséget von maga után.", "short": "A jogügylet érvényességéhez a külső megnyilvánulás (nyilatkozat) is szükséges, nemcsak a belső akarat."}, {"term": "Quasi delictum", "raw": "Quasi delictum", "def": "Delictumhoz hasonló, de nem valódi bűncselekményből fakadó felelősség – a vétkesség hiányzik vagy nem bizonyítható, mégis helytállással tartozik az elkövető. Pl. lakásból közútra kidobott dologért a lakás gazdája felel, még ha vétkes sem volt (de effusis et deiectis).", "short": "Delictumhoz hasonló, de nem valódi bűncselekményből fakadó felelősség – a vétkesség hiányzik vagy nem bizonyítható, mégis helytállással tartozik az elkövető."}, {"term": "Receptum-felelősség", "raw": "Receptum-felelősség", "def": "Hajós (nauta), fogadós (caupo), béristálló-tulajdonos (stabularius) szigorított, kimentési lehetőség nélküli helytállása az utasok, vendégek náluk elhelyezett vagyontárgyaiért. Még akkor is felelnek, ha kirabolják a fogadót. Ez a legszigorúbb helytállási forma – a custodia szigorított változata.", "short": "Hajós (nauta), fogadós (caupo), béristálló-tulajdonos (stabularius) szigorított, kimentési lehetőség nélküli helytállása az utasok, vendégek náluk elhelyezett vagyontárgyaiért."}, {"term": "Törvényes örökrész", "raw": "Törvényes örökrész", "def": "A törvényes öröklés rendje szerint az örökösnek járó hányad. A köteles rész ennek meghatározott törtrésze: a korai császárkorban 1/4-e (pl. 3 gyermek esetén törvényes örökrész 1/3, köteles rész 1/12), Iustinianusnál 1/3-a (köteles rész ez esetben 1/9). A köteles rész a querela inofficiosi testamenti útján érvényesíthető.", "short": "A törvényes öröklés rendje szerint az örökösnek járó hányad. A köteles rész ennek meghatározott törtrésze: a korai császárkorban 1/4-e (pl."}, {"term": "Custodia", "raw": "Custodia", "def": "Objektív helytállás a casus minorokért (kisebb balesetek: lopás, elvesztés) a vis maior határáig. Nincs vétkességi elem – eredményfelelősség. Ki felel: az érdekelt adós, akinél a szerződésből folyóan a másik fél dolga van (pl. bérlő, vállalkozó, haszonkölcsönbe vevő). A receptum a custodia szigorított változata.", "short": "Objektív helytállás a casus minorokért (kisebb balesetek: lopás, elvesztés) a vis maior határáig."}, {"term": "Jogellenes károkozás (Damnum iniuria datum)", "raw": "Damnum iniuria datum (jogellenes károkozás)", "def": "Lex Aquilia alapján szabályozott delictum. Elemei: damnum (tényleges sérülés, rongálódás), iniuria (jogellenesség + vétkesség), datum (közvetlen fizikai okozás). Actio legis Aquiliae: megölésnél 1 évre visszamenő, megsebesítésnél/rongálásnál 30 napra visszamenő legmagasabb értéket kell megfizetni.", "short": "Lex Aquilia alapján szabályozott delictum. Elemei: damnum (tényleges sérülés, rongálódás), iniuria (jogellenesség + vétkesség), datum (közvetlen fizikai okozás)."}, {"term": "Kötelesrész (Debita portio)", "raw": "Debita portio (kötelesrész)", "def": "A mellőzött törvényes örökös törvényi minimuma: a mindenkori törvényes örökrész 1/4-e (Iustinianusnál 1/3-a). Nem alanyi jogon jár – peres úton érvényesíthető: querela inofficiosi testamenti. Nem igényelheti a kitagadott, bántalmazó vagy gyilkos örökös.", "short": "A mellőzött törvényes örökös törvényi minimuma: a mindenkori törvényes örökrész 1/4-e (Iustinianusnál 1/3-a)."}, {"term": "Meggondolás kedvezménye (Beneficium deliberandi)", "raw": "Beneficium deliberandi (meggondolás kedvezménye)", "def": "Extraneus et voluntarius heres (házon kívüli, önkéntes örökös) számára nyújtott praetori kedvezmény. Ha a hitelezők sürgették az elfogadó nyilatkozat megtételét, a praetor legalább 100 nap gondolkodási időt adott, hogy az örökös megfontolja, elfogadja-e a (esetleg terhes) hagyatékot.", "short": "Extraneus et voluntarius heres (házon kívüli, önkéntes örökös) számára nyújtott praetori kedvezmény."}, {"term": "Tartózkodás kedvezménye (Beneficium abstinendi)", "raw": "Beneficium abstinendi (tartózkodás kedvezménye)", "def": "Sui et necessarii heredes (házon belüli, szükségszerű örökösök) számára nyújtott praetori kedvezmény. Ha a hagyaték nyilvánvalóan túlterhelt (damnosa hereditas), lehetővé tette, hogy ne avatkozzanak be a hagyatékba – így nem lesznek örökösök és vagyoni hátrányt sem szenvednek.", "short": "Sui et necessarii heredes (házon belüli, szükségszerű örökösök) számára nyújtott praetori kedvezmény."}, {"term": "Uratlan hagyaték (Bona vacantia)", "raw": "Bona vacantia (uratlan hagyaték)", "def": "Ha a hagyatéknak egyáltalán nincs örököse – senki sem fogadta el. A civiljog szerint bárki elbirtokolhatta; a praetor a passzív hagyatékra csőeljárást rendelt el; a császárkorban az államkincstárra (fiscus) szállt.", "short": "Ha a hagyatéknak egyáltalán nincs örököse – senki sem fogadta el. A civiljog szerint bárki elbirtokolhatta; a praetor a passzív hagyatékra csőeljárást rendelt el; a császárkorban az államkincstárra (fiscus) szállt."}, {"term": "Bonorum possessio unde vir et uxor", "raw": "Bonorum possessio unde vir et uxor", "def": "A praetori törvényes öröklés IV. osztálya: ha az előző három osztályból senki sem jelentkezett örökösként, a praetor a túlélő házastársnak adott bonorum possessiót. A civiljogi rendszerből teljesen kimaradt a nem manusos házasságban élt házastárs – ezt a méltánytalanságot orvosolta a praetor.", "short": "A praetori törvényes öröklés IV. osztálya: ha az előző három osztályból senki sem jelentkezett örökösként, a praetor a túlélő házastársnak adott bonorum possessiót."}, {"term": "Codicillus", "raw": "Codicillus", "def": "Végrendelet utólagos kiegészítéseként elismert, kevésbé alakszerű okirat – 'fiókvégrendelet'. Nem tartalmazhat örökösnevezést és kitagadást; nincs formakényszere. Augustus idején vált peresíthetővé. Önállóan is érvényes végrendelet nélkül, de ha végrendelet mellé csatolják, annak részévé válik.", "short": "Végrendelet utólagos kiegészítéseként elismert, kevésbé alakszerű okirat – 'fiókvégrendelet'."}, {"term": "Culpa levis", "raw": "Culpa levis", "def": "Kisebb fokú gondatlanság: az adós nem tanúsítja a bonus pater familias diligentiáját (jó gazda gondossága). Mérce: körültekintő, szorgos, gondos gazdaember. Minden érdekelt adós felel culpa levísért (aki hasznot húz a szerződésből). Az átlagembertől elvárható mércénél magasabb elvárhatósági szint.", "short": "Kisebb fokú gondatlanság: az adós nem tanúsítja a bonus pater familias diligentiáját (jó gazda gondossága)."}, {"term": "Ismétlés más fogalom alatt (Custodia)", "raw": "Custodia (ismétlés más fogalom alatt)", "def": "Lásd fent – az 'érdekelt adós, akinél idegen dolog van' felelőssége.", "short": "Lásd fent – az 'érdekelt adós, akinél idegen dolog van' felelőssége."}, {"term": "Actio redhibitoria", "raw": "Actio redhibitoria", "def": "Az eladói kellékszavatosságból eredő kereset: a vevő 6 hónapon belül elállhat az adásvételtől a rejtett hiba miatt, és visszakövetelheti a vételárat (az áru visszaadása ellenében). Az actio quanti minoris az enyhébb alternatíva: 1 éven belül árleszállítást kérhet.", "short": "Az eladói kellékszavatosságból eredő kereset: a vevő 6 hónapon belül elállhat az adásvételtől a rejtett hiba miatt, és visszakövetelheti a vételárat (az áru visszaadása ellenében)."}, {"term": "Anyagi mellőzhetetlenség", "raw": "Anyagi mellőzhetetlenség", "def": "A legközelebbi hozzátartozókat (lemenők, felmenők, testvérek) nemcsak megemlíteni kell a végrendeletben, hanem meg is kell illesse őket a hagyaték törvényileg meghatározott minimuma (köteles rész). Az alaki mellőzhetetlenséggel (formai szabály: a suusokat meg kell nevezni) együtt alkotja a végrendelet ellenére való öröklés jogalapját.", "short": "A legközelebbi hozzátartozókat (lemenők, felmenők, testvérek) nemcsak megemlíteni kell a végrendeletben, hanem meg is kell illesse őket a hagyaték törvényileg meghatározott minimuma (köteles rész)."}, {"term": "Bona ereptoria", "raw": "Bona ereptoria", "def": "Az érdemtelen örököstől (indignus) elvett vagyontárgyak összessége – az államkincstárra szálló örökség. Nem növedékjog tárgya: a többi örökös nem profitál belőle.", "short": "Az érdemtelen örököstől (indignus) elvett vagyontárgyak összessége – az államkincstárra szálló örökség."}, {"term": "Dare típusú szolgáltatás", "raw": "Dare típusú szolgáltatás", "def": "Az adós civiljogi tulajdont köteles átruházni. Pénzfizetés mindig dare. Pl. adásvételnél a vevő pénzt fizet (dare), az eladó átadja a dolgot (facere/praestare). A mutuum is dare – a kölcsönbe vevő tulajdont szerez.", "short": "Az adós civiljogi tulajdont köteles átruházni. Pénzfizetés mindig dare."}, {"term": "Facere típusú szolgáltatás", "raw": "Facere típusú szolgáltatás", "def": "Az adós nem köteles civiljogi tulajdon átruházására – tevékenységet, munkát, eredményt szolgáltat. Pl. locatio conductio operarum: bérmunkás munkát végez (facere); vállalkozó művet alkot (facere). Az eladó is facere-vel tartozik: a dolgot át kell adnia (de kellékszavatossággal: praestare).", "short": "Az adós nem köteles civiljogi tulajdon átruházására – tevékenységet, munkát, eredményt szolgáltat."}, {"term": "Fokközelség elve", "raw": "Fokközelség elve", "def": "Proximus remotiores excludit: a közelebbi fokú rokon kizárja a távolabbit az örökségből. A civiljogi törvényes öröklés alapelve: ha van sui heres (I. osztály), a proximi agnati (II. osztály) egyáltalán nem örökölhetnek, stb.", "short": "Proximus remotiores excludit: a közelebbi fokú rokon kizárja a távolabbit az örökségből."}, {"term": "Kellékszavatosság", "raw": "Kellékszavatosság", "def": "Az eladó helytállása azért, hogy az áru rendelkezik azokkal a tulajdonságokkal, amelyeket a törvény vagy a szerződés előír. Rejtett hibákért felel (a nyilvánvaló hibákat a vevőnek kell észlelnie). Keresetei: actio redhibitoria (6 hó, elállás) és actio quanti minoris (1 év, árleszállítás).", "short": "Az eladó helytállása azért, hogy az áru rendelkezik azokkal a tulajdonságokkal, amelyeket a törvény vagy a szerződés előír."}, {"term": "Lucrum cessans (elmaradt haszon)", "raw": "Lucrum cessans (elmaradt haszon)", "def": "A kár egyik fajtája: olyan előnytől, haszontól esünk el, amelyet joggal és alaposan remélhettünk. Pl. testi sértés következtében egy ideig nem tudunk dolgozni – a kiesett munkabér lucrum cessans. A damnum emergens (tényleges vagyoncsökkenés) ellentéte.", "short": "A kár egyik fajtája: olyan előnytől, haszontól esünk el, amelyet joggal és alaposan remélhettünk."}, {"term": "Permutatio (csere)", "raw": "Permutatio (csere)", "def": "Névtelen szerződés: dolgok tulajdonának kölcsönös átruházása pénz nélkül. Különbözik az adásvételtől: ott az egyik oldalon mindig pénz áll; cserénél mindkét fél dare szolgáltatással tartozik (mindkettő egyszerre eladó és vevő). Do ut des szerkezet.", "short": "Névtelen szerződés: dolgok tulajdonának kölcsönös átruházása pénz nélkül."}, {"term": "Generikus szolgáltatás (Praestatio generica)", "raw": "Praestatio generica (generikus szolgáltatás)", "def": "A kötelem tárgya fajta és mennyiség szerint meghatározott (pl. 50 mérő búza, 100 denarius). Genus perire non potest – a fajta nem vész el, az adós vis maiorra nem hivatkozhat. Ha a konkrét dolog elpusztul, az adós köteles más, azonos fajtájú és minőségű dologgal teljesíteni.", "short": "A kötelem tárgya fajta és mennyiség szerint meghatározott (pl. 50 mérő búza, 100 denarius)."}, {"term": "Specifikus szolgáltatás (Praestatio specifica)", "raw": "Praestatio specifica (specifikus szolgáltatás)", "def": "A kötelem tárgya egyedileg meghatározott (pl. 'Stichus nevű rabszolga'). Ha a konkrét dolog elpusztul az adósnak fel nem róhatóan, a kötelem megszűnik – legfeljebb kártérítési kötelezettség léphet a helyébe.", "short": "A kötelem tárgya egyedileg meghatározott (pl. 'Stichus nevű rabszolga')."}, {"term": "Senatus consultum Libonianum", "raw": "Senatus consultum Libonianum", "def": "Szenátusi határozat, amely megtiltotta, hogy végrendeletben azt a személyt nevezze örökössé az örökhagyó, aki a végrendeletet írta vagy diktálta. Az ilyen rendelkezés semmis volt – célja a végrendeletíró által elkövetett visszaélések megakadályozása", "short": "Szenátusi határozat, amely megtiltotta, hogy végrendeletben azt a személyt nevezze örökössé az örökhagyó, aki a végrendeletet írta vagy diktálta."}], "contracts": [{"name": "Mutuum (kölcsön)", "type": "Reálszerződés", "summary": "Elhasználható, helyettesíthető dolog tulajdonának átadása azzal, hogy ugyanannyit és ugyanolyat kell visszaadni.", "keywords": ["reál", "elhasználható", "tulajdon átszáll", "ugyanolyat vissza"]}, {"name": "Commodatum (haszonkölcsön)", "type": "Reálszerződés", "summary": "Nem elhasználható dolog ingyenes használatba adása; ugyanazt a dolgot kell visszaadni.", "keywords": ["reál", "ingyenes", "használat", "ugyanazt vissza", "custodia"]}, {"name": "Depositum (letét)", "type": "Reálszerződés", "summary": "Dolog ingyenes megőrzésre átadása; a letéteményes főszabály szerint nem használhatja.", "keywords": ["reál", "ingyenes", "megőrzés", "dolus"]}, {"name": "Pignus (kézizálog)", "type": "Reálszerződés / zálog", "summary": "A zálogtárgy birtoka a hitelezőhöz kerül, de a tulajdon az adósnál marad.", "keywords": ["birtok átmegy", "tulajdon marad", "kézizálog", "custodia"]}, {"name": "Fiducia", "type": "Zálogforma", "summary": "Biztosítéki célú tulajdonát cio ut facias"]}, {"name": "Stipulatio", "type": "Verbálszerződés", "summary": "Alakszerű kérdés-felelet formájában létrejövő szóbeli szerződés.", "keywords": ["verbál", "kérdés-felelet", "alakszerű"]}], "confusions": [{"q": "Melyiknél a jogügylet érvényes, de még nem hatályos, mert egy jövőbeli bizonytalan eseményre vár?", "a": "Felfüggesztő feltétel", "b": "Bontó feltétel", "ex": "Felfüggesztő feltétel = várunk valamire, addig nincs hatály."}, {"q": "Melyiknél a jogügylet azonnal hatályos, de egy feltétel bekövetkezése megszünteti?", "a": "Bontó feltétel", "b": "Felfüggesztő feltétel", "ex": "Bontó feltétel = működik, aztán a feltétel „lebontja”."}, {"q": "Melyik öröklési akadálynál az örökös jog szerint megszerzi, de érdemtelenség miatt elveszítik tőle?", "a": "Indignitas", "b": "Incapacitas", "ex": "Indignitas = érdemtelenség; az örökséget elragadják tőle."}, {"q": "Melyiknél a személyt kinevezhetik, de nem vagy csak korlátozottan szerezheti meg az örökséget?", "a": "Incapacitas", "b": "Indignitas", "ex": "Incapacitas = szerzésképtelenség; indignitas = megszerezte, de nem tarthatja meg."}, {"q": "Melyik jelent fejenkénti, egyenlő arányú öröklést?", "a": "In capita öröklés", "b": "In stirpes öröklés", "ex": "In capita = fejenként."}, {"q": "Melyik jelent törzsenkénti öröklést, ahol a kiesett örökös leszármazói együtt kapják a részt?", "a": "In stirpes öröklés", "b": "In capita öröklés", "ex": "In stirpes = törzsenként, képviseleti elv alapján."}, {"q": "Melyik hagyatéknak nincs még örököse, mert a delatio és acquisitio között áll?", "a": "Nyugvó hagyaték", "b": "Uratlan hagyaték", "ex": "Nyugvó hagyaték = átmeneti állapot; uratlan hagyaték = senki nem szerzi meg."}, {"q": "Melyik hagyaték az, amelyet végül senki nem szerez meg, és később a fiscusra szállhat?", "a": "Uratlan hagyaték", "b": "Nyugvó hagyaték", "ex": "Bona vacantia = uratlan hagyaték."}, {"q": "Melyik szolgáltatásnál egyedileg meghatározott dolgot kell szolgáltatni?", "a": "Specifikus szolgáltatás", const $=id=>document.getElementById(id); let score=0,count=0, wrong=[], current={}, selectedLeft=null, examQueue=[];
function update(){ $('score').textContent=`Pont: ${score}/${count}`; $('wrong').textContent=`Hibás gyűjtő: ${wrong.length}`; $('termCount').textContent=DATA.terms.length; }
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(a,n){return shuffle(a).slice(0,Math.min(n,a.length))}
function clean(s){return String(s||'').replace(/\s+/g,' ').trim()}
function stripParen(s){return clean(s).replace(/\s*\([^)]*\)/g,'').trim()}
function uniqueBy(arr, fn){const seen=new Set(); return arr.filter(x=>{const k=fn(x); if(seen.has(k)) return false; seen.add(k); return true;});}
function makeOptions(correct, distractors){let vals=uniqueBy([correct,...distractors].filter(Boolean).map(clean), x=>x.toLowerCase()).filter(x=>x!=='' && x.toLowerCase()!==clean(correct).toLowerCase()).slice(0,3); vals=[correct,...vals]; while(vals.length<4){let filler=sample(DATA.terms,1)[0].short; if(!vals.some(v=>v.toLowerCase()===filler.toLowerCase())) vals.push(filler);} return shuffle(vals.slice(0,4));}
function pickDistractors(item, field, n=10){let pool=DATA.terms.filter(x=>x!==item); if(field==='term') return sample(pool,n).map(x=>x.term); return sample(uniqueBy(pool,x=>x.short),n).map(x=>x.short);}
function startMC(type, pool){ const arr=pool&&pool.length?pool:DATA.terms; const item=sample(arr,1)[0]; const isT=type==='termToDef'; const question=isT?`Mit jelent ez a fogalom: „${item.term}”?`:clean(item.short); const correct=isT?item.short:item.term; const options=makeOptions(correct,pickDistractors(item,isT?'short':'term',12)); current={kind:'mc',type,item,correct}; $('app').innerHTML=`<div class="question">${question}</div><div class="sub">Válassz egyet. Utána rögtön megkapod a magyarázatot.</div><div class="options">${options.map(o=>`<button class="opt" onclick='answerMC(this, ${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div id="fb"></div><div class="toolbar"><button class="ghost" onclick="startMC('${type}')">Következő</button><button class="secondary" onclick="repeatWrong()">Hibásak gyakorlása</button></div>`; }
function answerMC(btn,val){ if(btn.disabled)return; document.querySelectorAll('.opt').forEach(b=>b.disabled=true); count++; const ok=val===current.correct; if(ok){score++; btn.classList.add('correct')}else{btn.classList.add('wrong'); wrong.push(current.item); document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.trim()===current.correct) b.classList.add('correct')})} $('fb').innerHTML=`<div class="feedback">${ok?'<span class="ok">Helyes.</span>':'<span class="bad">Nem ez.</span>'}<br><b>${current.item.term}</b><br>${current.item.def}</div>`; update(); }
function repeatWrong(){ if(!wrong.length){$('app').innerHTML='<p>Nincs hibás kérdés.</p>'; return;} const pool=uniqueBy([...wrong],x=>x.term); wrong=[]; update(); startMC('termToDef', pool); }
function startMatch(){ const items=sample(uniqueBy(DATA.terms,x=>x.short),8); const defs=shuffle(items.map(x=>x.short)); current={kind:'match',items,pairs:Object.fromEntries(items.map(x=>[x.term,x.short])),done:0}; selectedLeft=null; $('app').innerHTML=`<div class="question">Párosítsd a fogalmakat a jelentésükkel</div><div class="sub">Előbb bal oldalt válassz fogalmat, utána jobb oldalt jelentést.</div><div class="matchwrap"><div>${items.map(x=>`<div class="matchitem" data-term="${x.term.replaceAll('"','&quot;')}" onclick="selLeft(this)">${x.term}</div>`).join('')}</div><div>${defs.map(d=>`<div class="target" data-def="${d.replaceAll('"','&quot;')}" onclick="selRight(this)">${d}</div>`).join('')}</div></div><div id="fb"></div><div class="toolbar"><button class="ghost" onclick="startMatch()">Új párosító</button></div>`; }
function selLeft(el){ if(el.classList.contains('done'))return; document.querySelectorAll('.matchitem').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); selectedLeft=el; }
function selRight(el){ if(!selectedLeft||el.classList.contains('done'))return; const term=selectedLeft.dataset.term, def=el.dataset.def; count++; if(current.pairs[term]===def){score++; selectedLeft.classList.add('done'); el.classList.add('done'); $('fb').innerHTML='<div class="feedback"><span class="ok">Helyes párosítás.</span></div>'; current.done++; if(current.done===current.items.length){$('fb').innerHTML='<div class="feedback"><span class="ok">Kész a kör.</span> Jöhet az új adag.</div>';}} else{ $('fb').innerHTML=`<div class="feedback"><span class="bad">Nem ez.</span><br><b>${term}</b> helyes jelentése:<br>${current.pairs[term]}</div>`; const it=DATA.terms.find(x=>x.term===term); if(it) wrong.push(it);} selectedLeft.classList.remove('selected'); selectedLeft=null; update(); }
function startConfusion(){ const c=sample(DATA.confusions,1)[0]; current={kind:'conf',conf:c,correct:c.a}; const options=shuffle([c.a,c.b]); $('app').innerHTML=`<div class="question">${c.q}</div><div class="sub">Két könnyen összekeverhető fogalom közül válassz.</div><div class="options">${options.map(o=>`<button class="opt" onclick='answerConf(this, ${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div id="fb"></div><div class="toolbar"><button class="ghost" onclick="startConfusion()">Következő keverhető</button></div>`; }
function answerConf(btn,val){ document.querySelectorAll('.opt').forEach(b=>b.disabled=true); count++; if(val===current.correct){score++; btn.classList.add('correct'); $('fb').innerHTML=`<div class="feedback"><span class="ok">Helyes.</span><br>${current.conf.ex}</div>`;}else{btn.classList.add('wrong'); document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.trim()===current.correct)b.classList.add('correct')}); $('fb').innerHTML=`<div class="feedback"><span class="bad">Nem ez.</span><br>A helyes: <b>${current.correct}</b><br>${current.conf.ex}</div>`;} update(); }

  const n=c.name;
  let qs=[];
  qs.push({q:`A(z) ${n} milyen szerződéstípus?`, a:c.type, opts:['Reálszerződés','Konszenzuálszerződés','Verbálszerződés','Litterálszerződés'], ex:`${n}: ${c.type}. ${c.summary}`});
  if(n.includes('Mutuum')) qs.push(
    {q:'Mutuumnál mi történik a tulajdonnal?',a:'A tulajdon átszáll az adósra',opts:['A tulajdon átszáll az adósra','Csak a birtok száll át','Sem birtok, sem tulajdon nem száll át','Csak használati jog keletkezik'],ex:'Mutuum: elhasználható dolognál a tulajdon átszáll, ugyanannyit és ugyanolyat kell visszaadni.'},
    {q:'Mutuumnál mit kell visszaadni?',a:'Ugyanannyit és ugyanolyat',opts:['Ugyanannyit és ugyanolyat','Pontosan ugyanazt a dolgot','Csak a gyümölcsöket','Semmit, mert ajándék'],ex:'Mutuum tárgya helyettesíthető, elhasználható dolog.'});
  if(n.includes('Commodatum')) qs.push(
    {q:'Commodatumnál mit kell visszaadni?',a:'Ugyanazt a dolgot',opts:['Ugyanazt a dolgot','Ugyanannyit és ugyanolyat','Csak pénzbeli ellenértéket','A dolog becsértékét'],ex:'Commodatum = haszonkölcsön: nem elhasználható dolog használatra, ugyanazt kell visszaadni.'},
    {q:'Commodatum alapvető célja mi?',a:'Ingyenes használat',opts:['Ingyenes használat','Pénzért bérbeadás','Megőrzés','Tulajdonátruházás'],ex:'Haszonkölcsön: ingyenes használatba adás.'});
  if(n.includes('Depositum')) qs.push(
    {q:'Depositumnál mi a fő cél?',a:'Megőrzés',opts:['Megőrzés','Használat','Eladás','Közös gazdasági cél'],ex:'Depositum = letét: a dolog megőrzésre kerül átadásra.'},
    {q:'A letéteményes főszabály szerint használhatja-e a dolgot?',a:'Nem, főszabály szerint nem használhatja',opts:['Nem, főszabály szerint nem használhatja','Igen, szabadon használhatja','Igen, de csak eladhatja','Csak akkor, ha elhasználható'],ex:'A letét nem használatra, hanem megőrzésre szolgál.'});
  if(n.includes('Pignus')) qs.push(
    {q:'Pignusnál mi száll át a hitelezőre?',a:'A birtok, de nem a tulajdon',opts:['A birtok, de nem a tulajdon','A tulajdon és a birtok is','Sem birtok, sem tulajdon','Csak az öröklési jog'],ex:'Pignus = kézizálog: birtokátadás van, tulajdonátruházás nincs.'});
  if(n.includes('Hypotheca')) qs.push(
    {q:'Hypothecánál hol marad a zálogtárgy birtoka?',a:'Az adósnál marad',opts:['Az adósnál marad','Mindig a hitelezőhöz kerül','A praetorhoz kerül','A kezeshez kerül'],ex:'Hypotheca = jelzálog: sem tulajdon, sem birtok nem száll át.'});
  if(n.includes('Fiducia')) qs.push(
    {q:'Fiduciánál mi történik biztosítéki céllal?',a:'A tulajdon átszáll a hitelezőre',opts:['A tulajdon átszáll a hitelezőre','Csak a birtok száll át','Semmi nem száll át','Csak a haszonélvezet száll át'],ex:'Fiducia: a legerősebb, az adós számára legkockázatosabb zálogforma.'});
  if(n.includes('Emptio')) qs.push(
    {q:'Adásvételnél mi az essentialia negotii?',a:'Áru és vételár',opts:['Áru és vételár','Kamat és kötbér','Örökös és hagyományos','Birtok és zálog'],ex:'Emptio venditio létrejöttéhez az áru és a vételár meghatározása kell.'});
  if(n.includes('Locatio')) qs.push(
    {q:'A locatio conductio melyik hármast fogja össze?',a:'Dologbérlet, munkaszerződés, vállalkozási szerződés',opts:['Dologbérlet, munkaszerződés, vállalkozási szerződés','Kölcsön, letét, zálog','Végrendelet, hagyomány, kötelesrész','Lopás, rablás, károkozás'],ex:'Locatio conductio: rei, operarum, operis.'});
  if(n.includes('Mandatum')) qs.push(
    {q:'Mandatum fő jellemzője?',a:'Ingyenes megbízás/ügyellátás',opts:['Ingyenes megbízás/ügyellátás','Pénzért bérbeadás','Elhasználható dolog kölcsöne','Zálog birtokba adása'],ex:'Mandatum = megbízás, alapvetően ingyenes és bizalmi jellegű.'});
  if(n.includes('Societas')) qs.push(
    {q:'Societas lényege?',a:'Közös célra irányuló együttműködés',opts:['Közös célra irányuló együttműködés','Egy dolog megőrzése','Áru és vételár cseréje','Zálogjog alapítása'],ex:'Societas = társaság, közös gazdasági vagy más megengedett célra.'});
  return qs;
}
function renderContractQ(q, after){
  current={kind:'contractProp',correct:q.a,ex:q.ex,after};
  $('fb').innerHTML=`<div class="feedback"><div class="question" style="font-size:18px">${q.q}</div><div class="options">${shuffle(q.opts).map(o=>`<button class="opt" onclick='answerContractProp(this, ${JSON.stringify(o)})'>${o}</button>`).join('')}</div></div>`;
}
function contractPropertyQuiz(i){ const c=DATA.contracts[i]; renderContractQ(sample(contractQuestionsFor(c),1)[0]); }
function contractQuiz(){ const c=sample(DATA.contracts,1)[0]; const qs=contractQuestionsFor(c); renderContractQ(sample(qs,1)[0]); }
function answerContractProp(btn,val){
  document.querySelectorAll('#fb .opt').forEach(b=>b.disabled=true); count++;
  const ok=val===current.correct; if(ok){score++;btn.classList.add('correct')}else{btn.classList.add('wrong');document.querySelectorAll('#fb .opt').forEach(b=>{if(b.textContent.trim()===current.correct)b.classList.add('correct')})}
  $('fb').innerHTML += `<div class="feedback">${ok?'<span class="ok">Helyes.</span>':'<span class="bad">Nem ez.</span>'}<br>${current.ex}</div>`; update();
  if(current.after){ setTimeout(()=>current.after(),350); }
}
let contractRound=[]; let contractRoundStats={i:0,total:0,good:0};
function startContractRound(){ contractRound=sample(DATA.contracts.flatMap(c=>contractQuestionsFor(c)),10); contractRoundStats={i:0,total:contractRound.length,good:0}; nextContractRoundQ(); }
function nextContractRoundQ(){
  if(contractRoundStats.i>=contractRoundStats.total){ $('app').innerHTML=`<div class="question">Szerződés-kör eredménye</div><div class="feedback"><b>${contractRoundStats.good}/${contractRoundStats.total}</b> helyes válasz.<br>${contractRoundStats.good>=8?'Erős kör.':'Ezt még érdemes újrafuttatni, mert a szerződések vizsgán könnyen előkerülnek.'}</div><div class="toolbar"><button onclick="startContractRound()">Új szerződés-kör</button><button class="ghost" onclick="showContracts()">Vissza</button></div>`; return; }
  const q=contractRound[contractRoundStats.i++]; current={kind:'contractRound',correct:q.a,ex:q.ex};
  $('app').innerHTML=`<div class="pill">Szerződés-kör: ${contractRoundStats.i}/${contractRoundStats.total}</div><div class="question">${q.q}</div><div class="options">${shuffle(q.opts).map(o=>`<button class="opt" onclick='answerContractRound(this, ${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div id="fb"></div>`;
}
function answerContractRound(btn,val){ document.querySelectorAll('.opt').forEach(b=>b.disabled=true); const ok=val===current.correct; count++; if(ok){score++;contractRoundStats.good++;btn.classList.add('correct')}else{btn.classList.add('wrong');document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.trim()===current.correct)b.classList.add('correct')})} $('fb').innerHTML=`<div class="feedback">${ok?'<span class="ok">Helyes.</span>':'<span class="bad">Nem ez.</span>'}<br>${current.ex}</div><div class="toolbar"><button onclick="nextContractRoundQ()">Következő</button></div>`; update(); }
function startShortExam(){ const q=sample(DATA.examShort,1)[0]; current={kind:'shortExam',correct:q.a,ex:q.ex}; $('app').innerHTML=`<div class="question">${q.q}</div><div class="sub">Vizsgasegédlet-logikájú gyors kérdés.</div><div class="options">${shuffle(q.opts).map(o=>`<button class="opt" onclick='answerShortExam(this, ${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div id="fb"></div><div class="toolbar"><button class="ghost" onclick="startExam()">Következő vegyes</button></div>`; }
function answerShortExam(btn,val){ document.querySelectorAll('.opt').forEach(b=>b.disabled=true); count++; if(val===current.correct){score++; btn.classList.add('correct'); $('fb').innerHTML=`<div class="feedback"><span class="ok">Helyes.</span><br>${current.ex}</div>`;}else{btn.classList.add('wrong'); document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.trim()===current.correct)b.classList.add('correct')}); $('fb').innerHTML=`<div class="feedback"><span class="bad">Nem ez.</span><br>A helyes: <b>${current.correct}</b><br>${current.ex}</div>`;} update(); }
function makeMCExamItem(type){
  const item=sample(DATA.terms,1)[0]; const isT=type==='termToDef'; const question=isT?`Mit jelent ez a fogalom: „${item.term}”?`:clean(item.short); const correct=isT?item.short:item.term; const options=makeOptions(correct,pickDistractors(item,isT?'short':'term',12));
  return {type:'mc',question,correct,options,ex:`<b>${item.term}</b><br>${item.def}`};
}
function makeConfExamItem(){ const c=sample(DATA.confusions,1)[0]; return {type:'mc',question:c.q,correct:c.a,options:shuffle([c.a,c.b]),ex:c.ex}; }
function makeContractExamItem(){ const c=sample(DATA.contracts,1)[0]; const q=sample(contractQuestionsFor(c),1)[0]; return {type:'mc',question:q.q,correct:q.a,options:q.opts,ex:q.ex}; }
function makeShortExamItem(){ const q=sample(DATA.examShort,1)[0]; return {type:'mc',question:q.q,correct:q.a,options:q.opts,ex:q.ex}; }
function makeMatchExamItem(){ const items=sample(uniqueBy(DATA.terms,x=>x.short),6); return {type:'match',items,pairs:Object.fromEntries(items.map(x=>[x.term,x.short])),question:'Párosítsd a fogalmakat a jelentésükkel'}; }
let activeExam=null;
function buildExam(mode='balanced'){
  let qs=[];
  if(mode==='twenty'){
    const makers=[()=>makeMCExamItem('termToDef'),()=>makeMCExamItem('defToTerm'),makeConfExamItem,makeContractExamItem,makeShortExamItem];
    for(let i=0;i<20;i++) qs.push(sample(makers,1)[0]());
  } else {
    for(let i=0;i<3;i++){ qs.push(makeMCExamItem('termToDef'),makeMCExamItem('defToTerm'),makeConfExamItem(),makeContractExamItem(),makeShortExamItem()); }
    qs.push(makeMatchExamItem(),makeMatchExamItem(),makeMatchExamItem());
    qs=shuffle(qs);
  }
  return qs;
}
function startExam(mode){
  $('app').innerHTML=`<div class="question">Vegyes vizsgamód</div><div class="sub">Válassz vizsgatípust. A kérdések egyesével jönnek, és csak a végén kapsz összesítést.</div><div class="grid"><button onclick="beginExam('balanced')">Kiegyensúlyozott vizsga<br><span class='mini'>3-3 kérdés a fő típusokból + párosítás</span></button><button onclick="beginExam('twenty')">20 kérdéses vegyes vizsga<br><span class='mini'>minden indításkor új keverés</span></button></div>`;
}
function beginExam(mode){ activeExam={mode,qs:buildExam(mode),i:0,good:0,answers:[]}; renderExamQuestion(); }
function renderExamQuestion(){
  const ex=activeExam, q=ex.qs[ex.i];
  if(!q){ finishExam(); return; }
  if(q.type==='match'){
    current={kind:'examMatch',q,pairs:q.pairs,done:0,localGood:0,locked:false}; selectedLeft=null;
    const defs=shuffle(q.items.map(x=>x.short));
    $('app').innerHTML=`<div class="pill">Vizsga: ${ex.i+1}/${ex.qs.length}</div><div class="question">${q.question}</div><div class="sub">Ez 1 pontot ér: akkor jár, ha minden pár jó.</div><div class="matchwrap"><div>${q.items.map(x=>`<div class="matchitem" data-term="${x.term.replaceAll('"','&quot;')}" onclick="examSelLeft(this)">${x.term}</div>`).join('')}</div><div>${defs.map(d=>`<div class="target" data-def="${d.replaceAll('"','&quot;')}" onclick="examSelRight(this)">${d}</div>`).join('')}</div></div><div id="fb"></div>`;
  } else {
    current={kind:'examMC',q};
    $('app').innerHTML=`<div class="pill">Vizsga: ${ex.i+1}/${ex.qs.length}</div><div class="question">${q.question}</div><div class="options">${shuffle(q.options).map(o=>`<button class="opt" onclick='answerExamMC(this, ${JSON.stringify(o)})'>${o}</button>`).join('')}</div><div id="fb"></div>`;
  }
}
function answerExamMC(btn,val){
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true); const q=current.q; const ok=val===q.correct;
  if(ok){activeExam.good++; btn.classList.add('correct')} else {btn.classList.add('wrong'); document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.trim()===q.correct)b.classList.add('correct')})}
  activeExam.answers.push({q:q.question,ok,correct:q.correct});
  $('fb').innerHTML=`<div class="feedback">${ok?'<span class="ok">Helyes.</span>':'<span class="bad">Nem ez.</span>'}<br>${q.ex}</div><div class="toolbar"><button onclick="activeExam.i++; renderExamQuestion()">Következő</button></div>`;
}
function examSelLeft(el){ if(el.classList.contains('done')||current.locked)return; document.querySelectorAll('.matchitem').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); selectedLeft=el; }
function examSelRight(el){
  if(!selectedLeft||el.classList.contains('done')||current.locked)return; const term=selectedLeft.dataset.term, def=el.dataset.def;
  if(current.pairs[term]===def){ selectedLeft.classList.add('done'); el.classList.add('done'); current.localGood++; $('fb').innerHTML='<div class="feedback"><span class="ok">Jó pár.</span></div>'; }
  else { $('fb').innerHTML=`<div class="feedback"><span class="bad">Nem ez a pár.</span><br><b>${term}</b> helyes jelentése:<br>${current.pairs[term]}</div>`; }
  selectedLeft.classList.remove('selected'); selectedLeft=null; current.done++;
  if(current.localGood===Object.keys(current.pairs).length){ current.locked=true; activeExam.good++; activeExam.answers.push({q:current.q.question,ok:true,correct:'Minden pár helyes'}); $('fb').innerHTML='<div class="feedback"><span class="ok">Teljes párosítás helyes.</span></div><div class="toolbar"><button onclick="activeExam.i++; renderExamQuestion()">Következő</button></div>'; }
  else if(current.done>=Object.keys(current.pairs).length+2){ current.locked=true; activeExam.answers.push({q:current.q.question,ok:false,correct:'Nem lett teljes a párosítás'}); $('fb').innerHTML+='<div class="toolbar"><button onclick="activeExam.i++; renderExamQuestion()">Következő</button></div>'; }
}
function finishExam(){
  const ex=activeExam, pct=Math.round(ex.good/ex.qs.length*100);
  const text=pct>=80?'Jó kör, ez már vizsgaképes irány.':pct>=60?'Közepes kör: a hibás témákat még vissza kell gyúrni.':'Ez még tanuló fázis, nem baj: előbb fogalom→jelentés és párosító mód.';
  const bad=ex.answers.filter(a=>!a.ok).slice(0,8).map(a=>`<li>${a.q}<br><span class="mini">Helyes: ${a.correct}</span></li>`).join('');
  $('app').innerHTML=`<div class="question">Vizsga vége</div><div class="feedback"><b>Eredmény: ${ex.good}/${ex.qs.length} (${pct}%)</b><br>${text}</div>${bad?`<h3>Hibás / bizonytalan kérdések</h3><ol>${bad}</ol>`:''}<div class="toolbar"><button onclick="beginExam('${ex.mode}')">Új vizsga ugyanilyen típusból</button><button class="ghost" onclick="startExam()">Másik vizsgatípus</button></div>`;
}
update();
</script></body></html>
