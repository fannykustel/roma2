<h1>Római jog II. – interaktív tanuló teszt v3</h1>
<p>Magyar fogalmakra hangolva, latin csak ott, ahol tényleg indokolt. Nem latin memóriajáték, hanem vizsgára készülés.</p>
</header>

<section class="panel" id="home">

<button class="modebtn" onclick="showContracts()"><b>Szerződés-tréner</b><span>Összefoglaló + mini kérdések a szerződésekről.</span></button>

átlagember gondossága (absztrakt, objektív)."}, {"term": "Teljesítés helyetti adás (Datio in solutum)", "raw": "Datio in solutum (teljesítés helyetti adás)", "def": "Az adós a hitelező hozzájárulásával más dologgal teljesít, mint ami eredetileg ki volt kötve. Pl. pénzbeli tartozása fejében telket ajánl fel, amelyet a hitelező elfogad. Különbözik a facultas alternativától: ott a törvény/szerződés hatalmazza fel az adóst, itt a hitelező utólagos beleegyezése szükséges.", "short": "Az adós a hitelező hozzájárulásával más dologgal teljesít, mint ami eredetileg ki volt kötve. Pl."}, {"term": "Nyugvó hagyaték (Hereditas iacens)", "raw": "Hereditas iacens (nyugvó hagyaték)", "def": "Az örökség megnyílása (delatio) és megszerzése közötti ideiglenes állapot, amelyben a hagyatéknak nincs örököse. Önálló életet él: rabszolgái szerzeményeit gyarapítják, delictumai keletkezhetnek. A praetor szükség szerint gondnokot rendelhet ki. Ha végül senki sem szerzi meg, bona vacantia lesz belőle.", "short": "Az örökség megnyílása (delatio) és megszerzése közötti ideiglenes állapot, amelyben a hagyatéknak nincs örököse. Önálló életet él: rabszolgái szerzeményeit gyarapítják, delictumai keletkezhetnek."}, {"term": "Időtűzés", "raw": "Időtűzés (dies)", "def": "A felek azon rendelkezése, amellyel a jogügylet hatályát bizonyos időponthoz kötik. Dies a quo: kezdő időpont (ettől lép hatályba). Dies ad quem: befejező időpont (ekkor szűnik meg a hatály). Különbözik a feltételtől: az időtűzésnél a bekövetkezés biztos, csak az időpont kérdéses.", "short": "A felek azon rendelkezése, amellyel a jogügylet hatályát bizonyos időponthoz kötik. Dies a quo: kezdő időpont (ettől lép hatályba)."}, {"term": "Lineáris öröklés", "raw": "Lineáris (in lineas) öröklés", "def": "Iustinianusnál az oldalági rokonok öröklésénél alkalmazott elv: a hagyaték az anyai és apai ág szerint arányosan oszlik meg, tekintet nélkül arra, hogy melyik ágban több örökös van.", "short": "Iustinianusnál az oldalági rokonok öröklésénél l osztani mindazok között, akiknek a hajó megmenekítéséhez vagyoni érdekük fűződött. A locatio conductio operis keretében érvényesíthetők az igények: actio locati az árutulajdonosok részéről a hajós ellen."}, {"term": "Képviseleti elv", "raw": "Képviseleti elv (ius representationis)", "def": "Ha valaki az örökhagyó előtt meghal, helyére lép annak leszármazója – az apa örökrészét a gyermekek együttesen kapják meg (in stirpes öröklés). A civiljogi törvényes öröklésben érvényesül: az elhalt filius familias gyermekei és manusos felesége törzsként öröklik azt, ami az apának járt volna.", "short": "Ha valaki az örökhagyó előtt meghal, helyére lép annak leszármazója – az apa örökrészét a gyermekek együttesen kapják meg (in stirpes öröklés). A civiljogi törvényes öröklésben érvényesül: az elhalt filius familias gyermekei és manusos felesége törzsként öröklik azt, ami az apának járt volna."}, {"term": "Készfizető kezesség", "raw": "Készfizető kezesség", "def": "A hitelező nem köteles előbb a főadóst perelni – közvetlenül a kezest is pertőbe foghatja. Iustinianus a beneficium ordinis bevezetésével mérsékelte: a hitelező köteles előbb a főadóson megkísérelni a behajtást, és csak annak sikertelensége esetén fordulhat a kezeshez.", "short": "A hitelező nem köteles előbb a főadóst perelni – közvetlenül a kezest is pertőbe foghatja. Iustinianus a beneficium ordinis bevezetésével mérsékelte: a hitelező köteles előbb a főadóson megkísérelni a behajtást, és csak annak sikertelensége esetén fordulhat a kezeshez."}, {"term": "Negotium", "raw": "Negotium (jogügylet)", "def": "Joghatás kiváltására irányuló akaratkijelentés (pandektista definíció). Konjunktív elemei: akarat (belső), nyilatkozat (külső), joghatásra irányulás – mindháromnak hibátlannak és összhangban kell lennie. Ha bármelyik elem hibás, a jogügylet érvénytelen vagy nem létező.", "short": "Joghatás kiváltására irányuló akaratkijelentés (pandektista definíció). Konjunktív elemei: akarat (belső), nyilatkozat (külső), joghatásra irányulás – mindháromnak hibátlannak és összhangban kell lennie."}, {"term": "Nyilatkozati elv", "raw": "Nyilatkozati elv", "def": "A jogügylet érvényességéhez a külső megnyilvánulás (nyilatkozat) is szükséges, nemcsak a belső akarat. A formai előírások betartása garantálja a jogbiztonságot – ezért az alakszerű jogügyleteknél a forma megsértése érvénytelenséget von maga után.", "short": "A jogügylet érvényességéhez a külső megnyilvánulás (nyilatkozat) is szükséges, nemcsak a belső akarat. A formai előírások betartása garantálja a jogbiztonságot – ezért az alakszerű jogügyleteknél a forma megsértése érvénytelenséget von maga után."}, {"term": "Quasi delictum", "raw": "Quasi delictum", "def": "Delictumhoz hasonló, de nem valódi bűncselekményből fakadó felelősség – a vétkesség hiányzik vagy nem bizonyítható, mégis helytállással tartozik az elkövető. Pl. lakásból közútra kidobott dologért a lakás gazdája felel, még ha vétkes sem volt (de effusis et deiectis).", "short": "Delictumhoz hasonló, de nem valódi bűncselekményből fakadó felelősség – a vétkesség hiányzik vagy nem bizonyítható, mégis helytállással tartozik az elkövető. Pl."}, {"term": "Receptum-felelősség", "raw": "Receptum-felelősség", "def": "Hajós (nauta), fogadós (caupo), béristálló-tulajdonos (stabularius) szigorított, kimentési lehetőség nélküli helytállása az utasok, vendégek náluk elhelyezett vagyontárgyaiért. Még akkor is felelnek, ha kirabolják a fogadót. Ez a legszigorúbb helytállási forma – a custodia szigorított változata.", "short": "Hajós (nauta), fogadós (caupo), béristálló-tulajdonos (stabularius) szigorított, kimentési lehetőség nélküli helytállása az utasok, vendégek náluk elhelyezett vagyontárgyaiért. Még akkor is felelnek, ha kirabolják a fogadót."}, {"term": "Törvényes örökrész", "raw": "Törvényes örökrész", "def": "A törvényes öröklés rendje szerint az örökösnek járó hányad. A köteles rész ennek meghatározott törtrésze: a korai császárkorban 1/4-e (pl. 3 gyermek esetén törvényes örökrész 1/3, köteles rész 1/12), Iustinianusnál 1/3-a (köteles rész ez esetben 1/9). A köteles rész a querela inofficiosi testamenti útján érvényesíthető.", "short": "A törvényes öröklés rendje szerint az örökösnek járó hányad. A köteles rész ennek meghatározott törtrésze: a korai császárkorban 1/4-e (pl."}, {"term": "Custodia", "raw": "Custodia", "def": "Objektív helytállás a casus minorokért (kisebb balesetek: lopás, elvesztés) a vis maior határáig. Nincs vétkességi elem – eredményfelelősség. Ki felel: az érdekelt adós, akinél a szerződésből folyóan a másik fél dolga van (pl. bérlő, vállalkozó, haszonkölcsönbe vevő). A receptum a custodia szigorított változata.", "short": "Objektív helytállás a casus minorokért (kisebb balesetek: lopás, elvesztés) a vis maior határáig. Nincs vétkességi elem – eredményfelelősség."}, {"term": "Jogellenes károkozás (Damnum iniuria datum)", "raw": "Damnum iniuria datum (jogellenes károkozás)", "def": "Lex Aquilia alapján szabályozott delictum. Elemei: damnum (tényleges sérülés, rongálódás), iniuria (jogellenesség + vétkesség), datum (közvetlen fizikai okozás). Actio legis Aquiliae: megölésnél 1 évre visszamenő, megsebesítésnél/rongálásnál 30 napra visszamenő legmagasabb értéket kell megfizetni.", "short": "Lex Aquilia alapján szabályozott delictum. Elemei: damnum (tényleges sérülés, rongálódás), iniuria (jogellenesség + vétkesség), datum (közvetlen fizikai okozás)."}, {"term": "Debita portio", "raw": "Debita portio (kötelesrész)", "def": "A mellőzött törvényes örökös törvényi minimuma: a mindenkori törvényes örökrész 1/4-e (Iustinianusnál 1/3-a). Nem alanyi jogon jár – peres úton érvényesíthető: querela inofficiosi testamenti. Nem igényelheti a kitagadott, bántalmazó vagy gyilkos örökös.", "short": "A mellőzött törvényes örökös törvényi minimuma: a mindenkori törvényes örökrész 1/4-e (Iustinianusnál 1/3-a). Nem alanyi jogon jár – peres úton érvényesíthető: querela inofficiosi testamenti."}, {"term": "Beneficium deliberandi", "raw": "Benefici s dare – a kölcsönbe vevő tulajdont szerez.", "short": "Az adós civiljogi tulajdont köteles átruházni. Pénzfizetés mindig dare."}, {"term": "Facere típusú szolgáltatás", "raw": "Facere típusú szolgáltatás", "def": "Az adós nem köteles civiljogi tulajdon átruházására – tevékenységet, munkát, eredményt szolgáltat. Pl. locatio conductio operarum: bérmunkás munkát végez (facere); vállalkozó művet alkot (facere). Az eladó is facere-vel tartozik: a dolgot át kell adnia (de kellékszavatossággal: praestare).", "short": "Az adós nem köteles civiljogi tulajdon átruházására – tevékenységet, munkát, eredményt szolgáltat. Pl."}, {"term": "Fokközelség elve", "raw": "Fokközelség elve", "def": "Proximus remotiores excludit: a közelebbi fokú rokon kizárja a távolabbit az örökségből. A civiljogi törvényes öröklés alapelve: ha van sui heres (I. osztály), a proximi agnati (II. osztály) egyáltalán nem örökölhetnek, stb.", "short": "Proximus remotiores excludit: a közelebbi fokú rokon kizárja a távolabbit az örökségből. A civiljogi törvényes öröklés alapelve: ha van sui heres (I."}, {"term": "Kellékszavatosság", "raw": "Kellékszavatosság", "def": "Az eladó helytállása azért, hogy az áru rendelkezik azokkal a tulajdonságokkal, amelyeket a törvény vagy a szerződés előír. Rejtett hibákért felel (a nyilvánvaló hibákat a vevőnek kell észlelnie). Keresetei: actio redhibitoria (6 hó, elállás) és actio quanti minoris (1 év, árleszállítás).", "short": "Az eladó helytállása azért, hogy az áru rendelkezik azokkal a tulajdonságokkal, amelyeket a törvény vagy a szerződés előír. Rejtett hibákért felel (a nyilvánvaló hibákat a vevőnek kell észlelnie)."}, {"term": "Elmaradt haszon (Lucrum cessans)", "raw": "Lucrum cessans (elmaradt haszon)", "def": "A kár egyik fajtája: olyan előnytől, haszontól esünk el, amelyet joggal és alaposan remélhettünk. Pl. testi sértés következtében egy ideig nem tudunk dolgozni – a kiesett munkabér lucrum cessans. A damnum emergens (tényleges vagyoncsökkenés) ellentéte.", "short": "A kár egyik fajtája: olyan előnytől, haszontól esünk el, amelyet joggal és alaposan remélhettünk. Pl."}, {"term": "Csere (Permutatio)", "raw": "Permutatio (csere)", "def": "Névtelen szerződés: dolgok tulajdonának kölcsönös átruházása pénz nélkül. Különbözik az adásvételtől: ott az egyik oldalon mindig pénz áll; cserénél mindkét fél dare szolgáltatással tartozik (mindkettő egyszerre eladó és vevő). Do ut des szerkezet.", "short": "Névtelen szerződés: dolgok tulajdonának kölcsönös átruházása pénz nélkül. Különbözik az adásvételtől: ott az egyik oldalon mindig pénz áll; cserénél mindkét fél dare szolgáltatással tartozik (mindkettő egyszerre eladó és vevő)."}, {"term": "Generikus szolgáltatás (Praestatio generica)", "raw": "Praestatio generica (generikus szolgáltatás)", "def": "A kötelem tárgya fajta és mennyiség szerint meghatározott (pl. 50 mérő búza, 100 denarius). Genus perire non potest – a fajta nem vész el, az adós vis maiorra nem hivatkozhat. Ha a konkrét dolog elpusztul, az adós köteles más, azonos fajtájú és minőségű dologgal teljesíteni.", "short": "A kötelem tárgya fajta és mennyiség szerint meghatározott (pl. 50 mérő búza, 100 denarius)."}, {"term": "Specifikus szolgáltatás (Praestatio specifica)", "raw": "Praestatio specifica (specifikus szolgáltatás)", "def": "A kötelem tárgya egyedileg meghatározott (pl. 'Stichus nevű rabszolga'). Ha a konkrét dolog elpusztul az adósnak fel nem róhatóan, a kötelem megszűnik – legfeljebb kártérítési kötelezettség léphet a helyébe.", "short": "A kötelem tárgya egyedileg meghatározott (pl. 'Stichus nevű rabszolga')."}, {"term": "Senatus consultum Libonianum", "raw": "Senatus consultum Libonianum", "def": "Szenátusi határozat, amely megtiltotta, hogy végrendeletben azt a személyt nevezze örökössé az örökhagyó, aki a végrendeletet írta vagy diktálta. Az ilyen rendelkezés semmis volt – célja a végrendeletíró által elkövetett visszaélések megakadályozása.", "short": "Szenátusi határozat, amely megtiltotta, hogy végrendeletben azt a személyt nevezze örökössé az örökhagyó, aki a végrendeletet írta vagy diktálta. Az ilyen rendelkezés semmis volt – célja a végrendeletíró által elkövetett visszaélések megakadályozása."}], "contracts": [{"name": "Mutuum (kölcsön)", "type": "Reálszerződés", "summary": "Elhasználható, helyettesíthető dolog tulajdonának átadása; ugyanabból a fajtából ugyanannyit kell visszaadni.", "keywords": ["tulajdon átszáll", "elhasználható dolog", "ingyenes", "stricti iuris"]}, {"name": "Commodatum (haszonkölcsön)", "type": "Reálszerződés", "summary": "Nem elhasználható dolog ingyenes használatba adása; ugyanazt a dolgot kell visszaadni.", "keywords": ["használat", "nem száll át tulajdon", "ingyenes", "custodia"]}, {"name": "Depositum (letét)", "type": "Reálszerződés", "summary": "Dolog ingyenes megőrzésre átadása; a letéteményes főszabály szerint csak dolusért felel.", "keywords": ["megőrzés", "ingyenes", "dolus", "nem használhatja"]}, {"name": "Pignus (kézizálog)", "type": "Reálszerződés", "summary": "A zálogtárgy birtoka átkerül a hitelezőhöz, de a tulajdon az adósnál marad.", "keywords": ["birtok átmegy", "tulajdon nem", "zálog", "custodia"]}, {"name": "Emptio-venditio (adásvétel)", "type": "Konszenzuálszerződés", "summary": "Áru és vételár tárgyában létrejövő megegyezés; visszterhes, bonae fidei szerződés.", "keywords": ["áru", "vételár", "puszta megegyezés", "culpa levis"]}, {"name": "Locatio conductio (bérlet)", "type": "Konszenzuálszerződés", "summary": "Dolog használata, munka vagy mű eredményének szolgáltatása pénzfizetés ellenében.", "keywords": ["dologbérlet", "munkaszerződés", "vállalkozás", "actio locati/conducti"]}, {"name": "Mandatum (megbízás)", "type": "Konszenzuálszerződés", "summary": "Más érdekében végzett ingyenes ügyellátás; bizalmi jellegű szerződés.", "keywords": ["ingyenes", "ügyellátás", "bizalmi", "actio mandati"]}, {"name": "Societas (társaság)", "type": "Konszenzuálszerződés", "summary": "Két vagy több személy közös cél érdekében vagyoni együttműködésre állapodik meg.", "keywords": ["közös cél", "társaság", "bona fides", "actio pro socio"]}, {"name": "Fiducia", "type": "Zálogforma", "summary": "Az adós tulajdont ruház át biztosítékul a hitelezőre, aki teljesítés után köteles visszaadni.", "keywords": ["tulajdon átszáll", "bizalmi zálog", "legszigorúbb", "actio fiduciae"]}, {"name": "Hypotheca (jelzálog)", "type": "Zálogforma", "summary": "Sem a birtok, sem a tulajdon nem száll át; a zálogtárgy az adósnál marad.", "keywords": ["birtok marad", "tulajdon marad", "jelzálog", "adósnak kedvezőbb"]}], "confusions": [{"q": "Melyiknél lép hatályba azonnal a jogügylet, majd később szűnhet meg?", "a": "Bontó feltétel", "b": "Felfüggesztő feltétel", "ex": "Bontó feltételnél a jogügylet már hatályos, csak a feltétel beállta bontja meg."}, {"q": "Melyiknél várunk egy bizonytalan eseményre, hogy a jogügylet hatályba lépjen?", "a": "Felfüggesztő feltétel", "b": "Bontó feltétel", "ex": "Felfüggesztő feltételnél a jogügylet érvényes, de még nem hatályos."}, {"q": "Melyik azt jelenti, hogy az örökös megszerzi az örökséget, de érdemtelenség miatt elveszíti?", "a": "Indignitas", "b": "Incapacitas", "ex": "Indignitas = érdemtelenség; incapacitas = szerzésképtelenség."}, {"q": "Melyiknél nem tudja vagy csak korlátozottan tudja megszerezni az örökséget az örökös?", "a": "Incapacitas", "b": "Indignitas", "ex": "Incapax kinevezhető, de megszerezni nem vagy csak korlátozottan tud."}, {"q": "Melyik jelent fejenkénti öröklést?", "a": "In capita öröklés", "b": "In stirpes öröklés", "ex": "In capita = fejenként; in stirpes = törzsenként."}, {"q": "Melyik jelent törzsenkénti öröklést?", "a": "In stirpes öröklés", "b": "In capita öröklés", "ex": "In stirpesnél a kiesett örökös leszármazói együtt kapják meg az ő részét."}, {"q": "Melyiknél marad a zálogtárgy az adós birtokában?", "a": "Hypotheca (jelzálog)", "b": "Pignus (kézizálog)", "ex": "Hypothecánál sem birtok, sem tulajdon nem száll át."}, {"q": "Melyiknél kerül a zálogtárgy birtoka a hitelezőhöz?", "a": "Pignus (kézizálog)", "b": "Hypotheca (jelzálog)", "ex": "Pignus = kézizálog, a birtok átkerül a hitelezőhöz."}, {"q": "Melyiknél utólag, a hitelező beleegyezésével teljesít mással az adós?", "a": "Teljesítés helyetti adás (Datio in solutum)", "b": "Facultas alternativa", "ex": "Datio in solutum esetén utólagos hitelezői hozzájárulás kell."}, {"q": "Melyiknél eleve fel van hatalmazva az adós másik szolgáltatással teljesíteni?", "a": "Vagylagos felhatalmazottság (Facultas alternativa)", "b": "Teljesítés helyetti adás (Datio in solutum)", "ex": "Facultas alternativa: előre adott teljesítési lehetőség."}]};
let score=0,count=0, wrong=[];
let current=null, selectedLeft=null;
const $=id=>document.getElementById(id);
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function sample(arr,n){return shuffle(arr).slice(0,n)}
function update(){$('score').textContent=score;$('count').textContent=count;$('wrongCount').textContent=wrong.length}
function cleanDef(s){ return s.replace(/\s+/g,' ').trim(); }
function pickDistractors(correct, field, n=3){return sample(DATA.terms.filter(x=>x!==correct),n).map(x=>field==='term'?x.term:x.short)}
function startMC(type, pool=null){
 const arr = pool || DATA.terms;
 const item = sample(arr,1)[0];
 const isT2D = type==='termToDef';
 const question = isT2D ? `Mit jelent ez a fogalom: “${item.term}”?` : cleanDef(item.short);
 const correct = isT2D ? item.short : item.term;
 const options = shuffle([correct, ...pickDistractors(item, isT2D?'short':'term')]);
 current={type,item,correct};
 renderMC(question, options, isT2D ? 'Válaszd ki a helyes magyarázatot.' : 'Melyik fogalomra illik ez a meghatározás?');
}
function renderMC(question, options, sub){
 $('app').innerHTML = `<div class="question">${question}</div><div class="sub">${sub}</div><div class="options">${options.map((o,i)=>`<button class="opt" onclick="answerMC(this, ${JSON.stringify(o).replaceAll('"','&quot;')})">${String.fromCharCode(65+i)}) ${o}</button>`).join('')}</div><div id="fb"></div><p><button class="secondary" onclick="repeatWrong()">Hibásak gyakorlása</button> <button class="ghost" onclick="startMC(current.type)">Következő</button></p>`;
}
function answerMC(btn, val){
 if(btn.disabled) return;
 document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
 count++;
 const ok = val===current.correct;
 if(ok){score++; btn.classList.add('correct');}
 else{btn.classList.add('wrong'); wrong.push(current.item); document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.includes(current.correct.slice(0,35))) b.classList.add('correct')});}
 $('fb').innerHTML = `<div class="feedback">${ok?'<span class="ok">Helyes.</span>':'<span class="bad">Nem ez.</span>'}<br><b>${current.item.term}</b><br>${current.item.def}</div>`;
 update();
}
function repeatWrong(){
 if(!wrong.length){$('app').innerHTML='<p>Nincs hibás kérdés. Ez ritka pillanat, becsüld meg.</p>';return}
 const pool=[...wrong]; wrong=[]; update(); startMC('termToDef', pool);
}
function startMatch(){
 const items=sample(DATA.terms,6);
 const defs=shuffle(items.map(x=>x.short));
 current={items, pairs: Object.fromEntries(items.map(x=>[x.term,x.short])), done:0};
 $('app').innerHTML=`<div class="question">Párosítsd a fogalmakat a jelentésükkel</div><div class="sub">Előbb bal oldalt válassz fogalmat, aztán jobb oldalt jelentést.</div><div class="matchwrap"><div>${items.map(x=>`<div class="matchitem" data-term="${x.term.replaceAll('"','&quot;')}" onclick="selLeft(this)">${x.term}</div>`).join('')}</div><div>${defs.map(d=>`<div class="target" data-def="${d.replaceAll('"','&quot;')}" onclick="selRight(this)">${d}</div>`).join('')}</div></div><div id="fb"></div><p><button class="ghost" onclick="startMatch()">Új párosító</button></p>`;
}
function selLeft(el){ if(el.classList.contains('done'))return; document.querySelectorAll('.matchitem').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); selectedLeft=el;}
function selRight(el){
 if(!selectedLeft || el.classList.contains('done'))return;
 const term=selectedLeft.dataset.term, def=el.dataset.def;
 count++;
 if(current.pairs[term]===def){ score++; selectedLeft.classList.add('done'); el.classList.add('done'); selectedLeft.classList.remove('selected'); $('fb').innerHTML='<div class="feedback"><span class="ok">Helyes párosítás.</span></div>'; current.done++; if(current.done===current.items.length) $('fb').innerHTML='<div class="feedback"><span class="ok">Kész a kör.</span> Jöhet egy új adag.</div>';}
 else{ $('fb').innerHTML=`<div class="feedback"><span class="bad">Nem ez.</span><br><b>${term}</b> helyes jelentése:<br>${current.pairs[term]}</div>`; wrong.push(DATA.terms.find(x=>x.term===term)); selectedLeft.classList.remove('selected');}
 selectedLeft=null; update();
}
function startConfusion(){
 const c=sample(DATA.confusions,1)[0]; current={conf:c, correct:c.a};
 const options=shuffle([c.a,c.b]);
 $('app').innerHTML=`<div class="question">${c.q}</div><div class="sub">Két nagyon könnyen összekeverhető fogalom közül válassz.</div><div class="options">${options.map(o=>`<button class="opt" onclick="answerConf(this, '${o.replaceAll("'","\'")}')">${o}</button>`).join('')}</div><div id="fb"></div><p><button class="ghost" onclick="startConfusion()">Következő</button></p>`;
}
function answerConf(btn,val){
 document.querySelectorAll('.opt').forEach(b=>b.disabled=true); count++;
 if(val===current.correct){score++; btn.classList.add('correct'); $('fb').innerHTML=`<div class="feedback"><span class="ok">Helyes.</span><br>${current.conf.ex}</div>`;}
 else{btn.classList.add('wrong'); $('fb').innerHTML=`<div class="feedback"><span class="bad">Nem ez.</span><br>A helyes: <b>${current.correct}</b><br>${current.conf.ex}</div>`;}
 update();
}
function showContracts(){
 $('app').innerHTML=`<div class="question">Szerződés-tréner</div><div class="sub">Ezeket a szerződéseket összehasonlítva érdemes tanulni.</div>
 <div class="grid">${DATA.contracts.map(c=>`<div class="contract-card"><h3>${c.name}</h3><p><b>${c.type}</b></p><p>${c.summary}</p><p>${c.keywords.map(k=>`<span class="tag">${k}</span>`).join('')}</p></div>`).join('')}</div>
 <hr><p><button onclick="contractQuiz()">Szerződés mini kérdés</button></p><div id="fb"></div>`;
}
function contractQuiz(){
 const c=sample(DATA.contracts,1)[0]; const opt=shuffle([c.name,...sample(DATA.contracts.filter(x=>x!==c),3).map(x=>x.name)]);
 current={contract:c, correct:c.name};
 $('fb').innerHTML=`<div class="question" style="font-size:18px">Melyik szerződésre/zálogformára igaz?</div><p>${c.summary}</p><div class="options">${opt.map(o=>`<button class="opt" onclick="answerContract(this, '${o.replaceAll("'","\'")}')">${o}</button>`).join('')}</div>`;
}
function answerContract(btn,val){
 document.querySelectorAll('#fb .opt').forEach(b=>b.disabled=true); count++;
 if(val===current.correct){score++; btn.classList.add('correct');}
 else{btn.classList.add('wrong');}
 $('fb').innerHTML += `<div class="feedback">${val===current.correct?'<span class="ok">Helyes.</span>':'<span class="bad">Nem ez.</span>'}<br><b>${current.contract.name}</b><br>${current.contract.type} – ${current.contract.summary}</div>`;
 update();
}
function startExam(){
 const modes=['termToDef','defToTerm','conf'];
 const m=sample(modes,1)[0];
 if(m==='conf') startConfusion(); else startMC(m);
}
update();
</script>
</body>
